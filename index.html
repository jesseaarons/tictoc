<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="game-card" aria-labelledby="gameTitle">
      <p class="eyebrow">Classic Game</p>
      <h1 id="gameTitle">Tic-Tac-Toe</h1>
      <p class="game-text">Take turns placing X and O. First to connect three wins.</p>

      <p class="game-status" id="status" aria-live="polite">Player X's turn</p>

      <div class="board" id="board" aria-label="Tic-Tac-Toe board">
        <button class="cell" type="button" data-cell="0" aria-label="Cell 1"></button>
        <button class="cell" type="button" data-cell="1" aria-label="Cell 2"></button>
        <button class="cell" type="button" data-cell="2" aria-label="Cell 3"></button>
        <button class="cell" type="button" data-cell="3" aria-label="Cell 4"></button>
        <button class="cell" type="button" data-cell="4" aria-label="Cell 5"></button>
        <button class="cell" type="button" data-cell="5" aria-label="Cell 6"></button>
        <button class="cell" type="button" data-cell="6" aria-label="Cell 7"></button>
        <button class="cell" type="button" data-cell="7" aria-label="Cell 8"></button>
        <button class="cell" type="button" data-cell="8" aria-label="Cell 9"></button>
      </div>

      <button class="button button-primary" id="resetButton" type="button">Restart Game</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
